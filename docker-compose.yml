services:
  app:
    image: ghcr.io/proiezrush1/echml:latest
    pull_policy: always
    environment:
      - DATABASE_URL=postgresql://echml:${DB_PASSWORD:-echml_password}@db:5432/echml?schema=public
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-32chars-min}
      - ML_APP_ID=${ML_APP_ID:-}
      - ML_CLIENT_SECRET=${ML_CLIENT_SECRET:-}
      - ML_REDIRECT_URI=${ML_REDIRECT_URI:-https://echml.overcloud.us/api/ml/auth/callback}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://echml.overcloud.us}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - coolify
    labels:
      - traefik.docker.network=coolify
      - traefik.http.routers.http-0-jjwbwooyqamuftaedh3jyhwq-app.service=ech-crm-http
      - traefik.http.routers.https-0-jjwbwooyqamuftaedh3jyhwq-app.service=ech-crm-http
      - traefik.http.services.ech-crm-http.loadbalancer.server.port=3000

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=echml
      - POSTGRES_PASSWORD=${DB_PASSWORD:-echml_password}
      - POSTGRES_DB=echml
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echml"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  coolify:
    external: true
